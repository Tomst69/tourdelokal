<style>
  :root{
    --bg:#F6F3EC;
    --tile:#FFFFFF;
    --ink:#221E17;
    --muted:#8A8171;
    --red:#9B2226;
    --red-dark:#701418;
    --amber:#C98A2C;
    --foam:#F1E1BB;
    --line:#E6E0D2;
    --green:#3F6B4A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'PT Serif', Georgia, serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:48px;
  }
  a{color:inherit;}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px;}

  /* header */
  header{padding:28px 16px 18px;max-width:640px;margin:0 auto;}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
  .brand-logo{height:30px;width:auto;flex-shrink:0;margin-top:-2px;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--red);
    font-weight:500;
  }
  h1{
    font-family:'Big Shoulders Display', sans-serif;
    font-weight:800;
    font-size:36px;
    line-height:0.98;
    letter-spacing:0.01em;
    margin:6px 0 4px;
    text-transform:uppercase;
    display:flex;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }
  .lokal-logo{
    display:inline-block;
    background:var(--red);
    color:#fff;
    padding:1px 10px 5px;
    border-radius:4px;
    transform:rotate(-2deg);
    box-shadow:0 2px 0 rgba(0,0,0,0.18);
  }
  .sub{color:var(--muted);font-size:14.5px;margin:0 0 4px;max-width:46ch;}

  /* journey progress bar */
  .journey-row{display:flex;align-items:center;gap:14px;margin:18px 0 2px;}
  .journey-pct{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;font-size:28px;color:var(--red);
    line-height:1;min-width:56px;white-space:nowrap;
  }
  .journey-pct span{font-size:14px;font-weight:600;color:var(--muted);margin-left:1px;}
  .journey-track-wrap{position:relative;flex:1;height:26px;}
  .journey-track{
    position:absolute;top:50%;left:0;right:22px;height:3px;
    transform:translateY(-50%);
    background:repeating-linear-gradient(90deg,var(--line) 0 5px, transparent 5px 10px);
    border-radius:2px;
  }
  .journey-fill{
    position:absolute;top:0;left:0;height:100%;width:0%;
    background:linear-gradient(90deg,var(--amber),var(--red));
    border-radius:2px;
    transition:width .6s cubic-bezier(.4,0,.2,1);
  }
  .journey-marker{
    position:absolute;top:50%;left:0%;width:14px;height:14px;
    border-radius:50% 50% 50% 0;
    background:var(--amber);
    border:2px solid #fff;
    box-shadow:0 1px 2px rgba(0,0,0,.3);
    transform:translate(-60%,-85%) rotate(-45deg);
    transition:left .6s cubic-bezier(.4,0,.2,1);
  }
  .journey-finish{position:absolute;right:0;top:50%;transform:translateY(-50%);}

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:20px;
    transform:translate(-50%,16px);
    width:calc(100% - 32px);max-width:560px;
    background:var(--ink);color:#fff;
    border-radius:12px;padding:12px 15px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 10px 28px rgba(0,0,0,.28);
    opacity:0;pointer-events:none;z-index:1000;
    transition:opacity .3s ease, transform .3s ease;
  }
  .toast.show{opacity:1;transform:translate(-50%,0);}
  .toast-icon{flex-shrink:0;}
  .toast-text{
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;
    line-height:1.4;
  }
  .toast-water{background:var(--foam);color:var(--ink);}

  /* next stop banner */
  .next-banner{max-width:640px;margin:0 auto 18px;padding:0 16px;}
  .next-banner.hidden{display:none;}
  .next-banner-card{
    background:var(--tile);border:1px solid var(--line);border-left:4px solid var(--red);
    border-radius:var(--radius);padding:12px 14px;
  }
  .next-banner-label{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--red);font-weight:500;margin-bottom:5px;
  }
  .next-banner-main{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .next-banner-name{
    font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:17px;
    text-transform:uppercase;line-height:1.05;
  }
  .next-banner-area{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
  .next-banner-status{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    display:flex;align-items:center;white-space:nowrap;flex-shrink:0;
  }

  /* kdo platí rundu */
  .payer-wrap{max-width:640px;margin:0 auto 22px;padding:0 16px;}
  .payer-card{
    background:var(--tile);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;
  }
  .payer-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:26px;}
  .chip{
    display:inline-flex;align-items:center;gap:5px;
    background:var(--foam);color:var(--ink);
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    padding:4px 6px 4px 10px;border-radius:20px;
  }
  .chip-x{border:none;background:none;color:var(--red);cursor:pointer;font-size:14px;line-height:1;padding:2px 4px;}
  .chip-empty{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}
  .payer-input-row{display:flex;gap:8px;margin-bottom:10px;}
  .payer-input-row input{
    flex:1;font-family:'PT Serif',serif;font-size:14px;
    border:1px solid var(--line);border-radius:8px;padding:8px 10px;
    background:var(--bg);color:var(--ink);
  }
  .payer-input-row input:focus-visible{outline:2px solid var(--red);}
  .payer-add{
    width:38px;flex-shrink:0;border:none;border-radius:8px;
    background:var(--ink);color:#fff;font-size:18px;cursor:pointer;
  }
  .payer-spin{
    width:100%;border:none;border-radius:8px;padding:10px;
    background:var(--red);color:#fff;
    font-family:'Big Shoulders Display',sans-serif;font-weight:700;
    letter-spacing:0.04em;text-transform:uppercase;font-size:14px;
    cursor:pointer;
  }
  .payer-spin:active{background:var(--red-dark);}
  .payer-result{
    margin-top:10px;min-height:20px;text-align:center;
    font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);
    transition:transform .2s ease;
  }
  .payer-result.landed{color:var(--red);font-weight:600;transform:scale(1.06);}

  /* finish-line summary */
  .summary-wrap{max-width:640px;margin:0 auto 22px;padding:0 16px;}
  .summary-card{
    background:var(--tile);border:1px dashed #C7BFA8;border-radius:10px;
    padding:14px 16px;
    opacity:0;max-height:0;overflow:hidden;
    transition:opacity .5s ease;
  }
  .summary-card.show{opacity:1;max-height:260px;}
  .summary-title{
    font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:17px;
    text-transform:uppercase;color:var(--red);margin-bottom:8px;
  }
  .summary-row{
    display:flex;justify-content:space-between;padding:4px 0;
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;
    border-bottom:1px dashed var(--line);
  }
  .summary-row:last-child{border-bottom:none;}
  .summary-row span:first-child{color:var(--muted);}
  .summary-row span:last-child{color:var(--ink);font-weight:500;}

  /* map */
  .map-card{
    max-width:640px;margin:0 auto 22px;padding:0 16px;
  }
  #map{
    height:300px;width:100%;border-radius:var(--radius);
    border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(34,30,23,0.06);
  }
  .leaflet-container{font-family:'PT Serif',serif;background:#EFEAE0;}
  .pin{
    width:28px;height:28px;border-radius:50% 50% 50% 0;
    background:var(--red);
    transform:rotate(-45deg);
    border:2px solid #fff;
    box-shadow:0 1px 3px rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;
  }
  .pin span{
    transform:rotate(45deg);
    color:#fff;font-family:'IBM Plex Mono',monospace;
    font-weight:600;font-size:12px;
  }
  .pin.done{background:var(--amber);}

  /* list */
  .list{max-width:640px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:10px;}
  .stop{
    background:var(--tile);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    transition:border-color .2s ease;
  }
  .stop.checked{border-color:#E3CE9C;}
  .stop-row{
    display:flex;align-items:center;gap:12px;
    padding:13px 14px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .stop-row:focus-visible{outline:2px solid var(--red);outline-offset:-2px;}
  .num{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:700;font-size:20px;color:var(--muted);
    width:22px;flex-shrink:0;text-align:center;
  }
  .stop.checked .num{color:var(--amber);}
  .info{flex:1;min-width:0;}
  .name{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:700;font-size:18px;letter-spacing:0.01em;
    text-transform:uppercase;line-height:1.05;
  }
  .meta{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;color:var(--muted);margin-top:3px;
    display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  }
  .status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;}
  .status-open{background:var(--green);}
  .status-closed{background:var(--muted);}

  .chevron{
    width:16px;height:16px;flex-shrink:0;color:var(--muted);
    transition:transform .25s ease;
  }
  .stop.open .chevron{transform:rotate(90deg);}

  /* beer-mug checkbox */
  .mug-btn{
    width:34px;height:34px;flex-shrink:0;border:none;background:none;
    cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .mug-btn:focus-visible{outline:2px solid var(--red);outline-radius:6px;border-radius:6px;}
  .mug-fill{transition:height .35s cubic-bezier(.34,1.3,.64,1);}
  .mug-foam{transition:opacity .3s ease;}

  .details{
    max-height:0;overflow:hidden;
    transition:max-height .3s ease;
    border-top:1px solid transparent;
  }
  .stop.open .details{border-top:1px solid var(--line);}
  .details-inner{padding:12px 14px 16px 48px;}
  .note{font-size:13.5px;color:var(--ink);line-height:1.5;margin:0 0 12px;}
  .hours-table{width:100%;border-collapse:collapse;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  .hours-table td{padding:3px 0;color:var(--muted);}
  .hours-table td.day{width:34px;color:var(--ink);font-weight:500;}

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

    phone:"+420 604 500 257",
    mapsUrl:"https://maps.google.com/?cid=1718404119397896123",
    hours:{ne:["12:00","22:30"],po:["11:00","23:30"],ut:["11:00","23:30"],st:["11:00","23:30"],ct:["11:00","23:30"],pa:["11:00","23:30"],so:["12:00","23:30"]}

const dayOrder = ["po","ut","st","ct","pa","so","ne"];

// hlášky po každém odškrtnutém pivu, indexováno počtem splněných zastávek (1-7)
const cheers = [
  null,
  ["Etapa 1 hotová. Zahřívací kolečko za vámi.", "První razítko v knížce jízd. Slušný start."],
  ["Dvě dole. Tempo pelotonu, žádný sprint.", "Druhé pivo a rukopis je pořád čitelný."],
  ["Tři zastávky. Chůze zatím rovná jak Dlouhá třída.", "Tři! Forma stabilní, žaludek taky."],
  ["Půlka za vámi. Navigace ještě věří, že víte, kam jdete.", "Čtyři piva, nadpoloviční většina hotová."],
  ["Pět! Konverzace teď o poznání filozofičtější.", "Páté pivo. Vtipy najednou o dost lepší."],
  ["Šest hotovo. Poslední etapa. Držte se chodníku, ne naopak.", "Šestá zastávka. Cílová rovinka na dohled."],
  ["Kompletní Tour de Lokál! Žluté tričko je vaše. Zítra klidně vodu.", "Sedm ze sedmi. Legenda dne. Gratulujeme."]
];
const waterReminders = {
  2:["Mezitím i sklenici vody – ušetří vám to zítřek.","Voda mezi rundami: starý, ale funkční trik."],
  4:["Půlka hotová, půlka litru vody taky nebude na škodu.","Doplňte i H2O, ne jen pivo."],
  6:["Poslední úsek. Voda teď = ráno díky.","Sklenice vody před finále. Zítřejší vy poděkuje."]
};
let toastTimer = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.querySelector('.toast-text').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.classList.remove('show'); }, 3400);
}
let toastWaterTimer = null;
function showWaterToast(msg){
  const el = document.getElementById('toastWater');
  el.querySelector('.toast-text').textContent = msg;
  el.classList.add('show');
  clearTimeout(toastWaterTimer);
  toastWaterTimer = setTimeout(()=>{ el.classList.remove('show'); }, 3200);
}
const dayLabel = {po:"Po",ut:"Út",st:"St",ct:"Čt",pa:"Pá",so:"So",ne:"Ne"};
const dayKeyByJsDay = ["ne","po","ut","st","ct","pa","so"]; // Date.getDay(): 0=Sun

function toMinutes(hhmm){
  const [h,m] = hhmm.split(":").map(Number);
  return h*60+m;
}
function formatMins(mins){
  if(mins<60) return mins+" min";
  const h=Math.floor(mins/60), m=mins%60;
  return m>0 ? h+"h "+m+"min" : h+"h";
}
function computeStatus(hours){
  const now = new Date();
  const key = dayKeyByJsDay[now.getDay()];
  const [openStr,closeStr] = hours[key];
  const nowMin = now.getHours()*60+now.getMinutes();
  const openMin = toMinutes(openStr);
  let closeMin = toMinutes(closeStr);
  if(closeMin<=openMin) closeMin += 24*60; // handles 24:00 / past-midnight
  if(nowMin<openMin) return {state:'before', text:'otevírá v '+openStr};
  if(nowMin<closeMin) return {state:'open', text:'zavírá za '+formatMins(closeMin-nowMin)};
  return {state:'after', text:'dnes už zavřeno'};
}

let checked = {};
let checkedAt = {};

async function loadState(){
  try{
    const raw = localStorage.getItem('tour-de-lokal-state');
    if(raw){
      const parsed = JSON.parse(raw);
      checked = parsed.checked || {};
      checkedAt = parsed.times || {};
    }
  }catch(e){ checked = {}; checkedAt = {}; }
}
async function saveState(){
  try{ localStorage.setItem('tour-de-lokal-state', JSON.stringify({checked, times:checkedAt})); }
  catch(e){ /* storage unavailable (e.g. private browsing) - state stays in-memory for this session */ }
}

let partyNames = [];
async function loadNames(){
  try{
    const raw = localStorage.getItem('tour-de-lokal-names');
    if(raw){ partyNames = JSON.parse(raw); }
  }catch(e){ partyNames = []; }
}
async function saveNames(){
  try{ localStorage.setItem('tour-de-lokal-names', JSON.stringify(partyNames)); }
  catch(e){ /* storage unavailable */ }
}

const mugFullSvg = (fillId) => `
  <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
    <path class="mug-foam" d="M6 6h11v2.5c0 1.5-1.2 2.5-2.5 2.5h-6C7.2 11 6 10 6 8.5V6z" fill="#F1E1BB" opacity="${fillId?1:0}"/>
    <rect class="mug-fill" x="6" y="8" width="11" height="12" fill="${fillId?'#C98A2C':'transparent'}"/>
    <path d="M6 6h11v13.5c0 1.4-1.1 2.5-2.5 2.5h-6C7.1 22 6 20.9 6 19.5V6z" stroke="#221E17" stroke-width="1.4" fill="none"/>
    <path d="M17 9.5h1.8c1 0 1.7.8 1.7 1.7v4.3c0 .9-.7 1.7-1.7 1.7H17" stroke="#221E17" stroke-width="1.4" fill="none"/>
  </svg>`;

function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  stops.forEach(stop=>{
    const isChecked = !!checked[stop.id];
    const status = computeStatus(stop.hours);
    const el = document.createElement('div');
    el.className = 'stop' + (isChecked ? ' checked' : '');
    el.id = 'stop-'+stop.id;

    const rows = dayOrder.map(k=>{
      const todayKey = dayKeyByJsDay[new Date().getDay()];
      return `<tr class="${k===todayKey?'today':''}">
        <td class="day">${dayLabel[k]}</td>
        <td>${stop.hours[k][0]}–${stop.hours[k][1]}</td>
      </tr>`;
    }).join('');

    el.innerHTML = `
      <div class="stop-row" tabindex="0" role="button" aria-expanded="false">
        <div class="num">${String(stop.id).padStart(2,'0')}</div>
        <div class="info">
          <div class="name">${stop.name}</div>
          <div class="meta">
            <span><span class="status-dot ${status.state==='open'?'status-open':'status-closed'}" id="dot-${stop.id}"></span><span id="statustext-${stop.id}">${status.text}</span></span>
          </div>
        </div>
        <svg class="chevron" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <button class="mug-btn" aria-label="Splněno: ${stop.name}" aria-pressed="${isChecked}">
          ${mugFullSvg(isChecked)}
        </button>
      </div>
      <div class="details">
        <div class="details-inner">
          <p class="note">${stop.note}</p>
          <table class="hours-table">${rows}</table>
          <div class="links-row">
            <a href="${stop.mapsUrl}" target="_blank" rel="noopener">Otevřít v mapě</a>
            <a href="tel:${stop.phone.replace(/\s/g,'')}">${stop.phone}</a>
          </div>
        </div>
      </div>
    `;

    const row = el.querySelector('.stop-row');
    const mugBtn = el.querySelector('.mug-btn');

    function toggleOpen(){
      const nowOpen = el.classList.toggle('open');
      row.setAttribute('aria-expanded', nowOpen);
      const details = el.querySelector('.details');
      details.style.maxHeight = nowOpen ? details.scrollHeight+'px' : '0px';
    }
    row.addEventListener('click', (e)=>{ if(e.target.closest('.mug-btn')) return; toggleOpen(); });
    row.addEventListener('keydown', (e)=>{
      if(e.target.closest('.mug-btn')) return;
      if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleOpen(); }
    });

    mugBtn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const nowChecked = !checked[stop.id];
      checked[stop.id] = nowChecked;
      if(nowChecked){ checkedAt[stop.id] = Date.now(); }
      else{ delete checkedAt[stop.id]; }
      await saveState();
      render();
      updateProgress();
      updateMapMarkers();
      updateNextBanner();
      updateSummary();
      if(nowChecked){
        const doneCount = stops.filter(s=>checked[s.id]).length;
        const variants = cheers[doneCount];
        if(variants){ showToast(variants[Math.floor(Math.random()*variants.length)]); }
        const waterVariants = waterReminders[doneCount];
        if(waterVariants){
          setTimeout(()=>{
            showWaterToast(waterVariants[Math.floor(Math.random()*waterVariants.length)]);
          }, 3600);
        }
      }
    });

    list.appendChild(el);
  });
}

function updateProgress(){
  const total = stops.length;
  const done = stops.filter(s=>checked[s.id]).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('journeyFill').style.width = pct+'%';
  document.getElementById('journeyMarker').style.left = pct+'%';
  document.getElementById('journeyPct').innerHTML = pct+'<span>%</span>';
}

// --- map ---
let map, markers = [];
function initMap(){
  map = L.map('map', {zoomControl:true, scrollWheelZoom:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom:19,
    attribution:'&copy; OpenStreetMap'
  }).addTo(map);

  const latlngs = stops.map(s=>[s.lat,s.lng]);
  L.polyline(latlngs, {color:'#9B2226', weight:3, opacity:0.75, dashArray:'1,10', lineCap:'round'}).addTo(map);

  stops.forEach(stop=>{
    const icon = L.divIcon({
      className:'',
      html:`<div class="pin" id="pin-${stop.id}"><span>${stop.id}</span></div>`,
      iconSize:[28,28], iconAnchor:[14,26]
    });
    const marker = L.marker([stop.lat, stop.lng], {icon}).addTo(map);
    marker.bindPopup(`<b>${stop.id}. ${stop.name}</b><br>${stop.area}`);
    marker.on('click', ()=>{
      const el = document.getElementById('stop-'+stop.id);
      if(el){ el.scrollIntoView({behavior:'smooth', block:'center'}); }
    });
    markers.push(marker);
  });

  map.fitBounds(L.latLngBounds(latlngs), {padding:[24,24]});
}
function updateMapMarkers(){
  stops.forEach(stop=>{
    const pin = document.getElementById('pin-'+stop.id);
    if(pin){ pin.classList.toggle('done', !!checked[stop.id]); }
  });
}

// --- teď na řadě banner ---
function updateNextBanner(){
  const banner = document.getElementById('nextBanner');
  const next = stops.find(s=>!checked[s.id]);
  if(!next){ banner.classList.add('hidden'); return; }
  banner.classList.remove('hidden');
  const status = computeStatus(next.hours);
  document.getElementById('nextBannerName').textContent = next.name;
  document.getElementById('nextBannerArea').textContent = next.area;
  document.getElementById('nextBannerStatus').textContent = status.text;
  document.getElementById('nextBannerDot').className = 'status-dot ' + (status.state==='open' ? 'status-open':'status-closed');
}

// --- souhrn v cíli ---
function formatTime(ts){
  return new Date(ts).toLocaleTimeString('cs-CZ', {hour:'2-digit', minute:'2-digit'});
}
function updateSummary(){
  const card = document.getElementById('summaryCard');
  const total = stops.length;
  const done = stops.filter(s=>checked[s.id]).length;
  const finished = done === total;
  const times = stops.map(s=>checkedAt[s.id]).filter(Boolean).sort((a,b)=>a-b);
  if(times.length < 1){ card.classList.remove('show'); return; }
  const start = times[0];
  const end = finished ? times[times.length-1] : Date.now();
  const elapsedMin = Math.max(0, Math.round((end-start)/60000));
  const avgMin = times.length > 1 ? Math.round(elapsedMin/(times.length-1)) : null;
  document.getElementById('summaryTitle').textContent = finished ? 'Tour dokončena' : `Průběžně · ${done}/${total}`;
  document.getElementById('sumEndLabel').textContent = finished ? 'Cíl' : 'Teď';
  document.getElementById('sumStart').textContent = formatTime(start);
  document.getElementById('sumEnd').textContent = formatTime(end);
  document.getElementById('sumTotal').textContent = formatMins(elapsedMin);
  document.getElementById('sumPace').textContent = avgMin!=null ? formatMins(avgMin)+' / pivo' : '–';
  card.classList.add('show');
}

// --- živé hodiny: dopočítávají "zavírá za..." mezi rendery ---
function tickClock(){
  stops.forEach(stop=>{
    const status = computeStatus(stop.hours);
    const dotEl = document.getElementById('dot-'+stop.id);
    const textEl = document.getElementById('statustext-'+stop.id);
    if(dotEl) dotEl.className = 'status-dot ' + (status.state==='open'?'status-open':'status-closed');
    if(textEl) textEl.textContent = status.text;
  });
  updateNextBanner();
  updateSummary();
}
setInterval(tickClock, 30000);

// --- kdo platí rundu ---
function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function renderChips(){
  const wrap = document.getElementById('payerChips');
  if(partyNames.length===0){
    wrap.innerHTML = '<span class="chip-empty">Zatím nikdo v partě.</span>';
    return;
  }
  wrap.innerHTML = partyNames.map((n,i)=>`<span class="chip">${escapeHtml(n)}<button data-i="${i}" class="chip-x" aria-label="Odebrat ${escapeHtml(n)}">×</button></span>`).join('');
  wrap.querySelectorAll('.chip-x').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      partyNames.splice(Number(btn.dataset.i), 1);
      await saveNames();
      renderChips();
    });
  });
}
async function addPayerName(){
  const input = document.getElementById('payerInput');
  const val = input.value.trim();
  if(!val) return;
  partyNames.push(val);
  input.value = '';
  await saveNames();
  renderChips();
}
let spinTimer = null;
function spinPayer(){
  const resultEl = document.getElementById('payerResult');
  resultEl.classList.remove('landed');
  if(partyNames.length < 2){
    resultEl.textContent = 'Přidejte aspoň dvě jména.';
    return;
  }
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const finalPick = partyNames[Math.floor(Math.random()*partyNames.length)];
  if(reduceMotion){
    resultEl.textContent = 'Platí: '+finalPick;
    resultEl.classList.add('landed');
    return;
  }
  let ticks = 0;
  const maxTicks = 16;
  clearInterval(spinTimer);
  spinTimer = setInterval(()=>{
    resultEl.textContent = partyNames[Math.floor(Math.random()*partyNames.length)];
    ticks++;
    if(ticks >= maxTicks){
      clearInterval(spinTimer);
      resultEl.textContent = 'Platí: '+finalPick;
      resultEl.classList.add('landed');
    }
  }, 90);
}
document.getElementById('payerAddBtn').addEventListener('click', addPayerName);
document.getElementById('payerInput').addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){ e.preventDefault(); addPayerName(); }
});
document.getElementById('payerSpinBtn').addEventListener('click', spinPayer);
document.getElementById('resetNamesBtn').addEventListener('click', async ()=>{
  partyNames = [];
  await saveNames();
  renderChips();
  document.getElementById('payerResult').textContent = '';
});

document.getElementById('resetBtn').addEventListener('click', async ()=>{
  checked = {};
  checkedAt = {};
  await saveState();
  render();
  updateProgress();
  updateMapMarkers();
  updateNextBanner();
  updateSummary();
});

(async function(){
  await loadState();
  await loadNames();
  initMap();
  render();
  renderChips();
  updateProgress();
  updateMapMarkers();
  updateNextBanner();
  updateSummary();
})();
</script>
</body>
